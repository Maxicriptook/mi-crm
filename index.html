  const[dniChecking,setDniChecking]=useState(false);
  const[dniAlerta,setDniAlerta]=useState("");

  // Estilos dinámicos según tema
  const I={width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"};
  const L={fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:5,display:"block"};
  const K={background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:12};
  const B=(bg=C.green,col="#fff")=>({background:bg,color:col,border:"none",borderRadius:8,padding:"9px 16px",fontWeight:600,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"});
  const BS=(bg=C.green,col="#fff")=>({background:bg,color:col,border:"none",borderRadius:6,padding:"5px 11px",fontWeight:600,cursor:"pointer",fontSize:12});
  const TG=color=>({background:color+"22",color,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,display:"inline-block"});
  const TB={display:"flex",gap:2,background:C.inputBg,borderRadius:10,padding:4,marginBottom:16,overflowX:"auto"};
  const TBT=a=>({flex:1,minWidth:75,padding:"7px 0",textAlign:"center",borderRadius:7,fontWeight:600,fontSize:12,cursor:"pointer",border:"none",background:a?C.green:"transparent",color:a?"#fff":C.muted,whiteSpace:"nowrap"});
  const ST={fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:12};
  const SC=color=>({background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",borderTop:`3px solid ${color}`});

  useEffect(()=>{const h=()=>setIsMob(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  const cargarClientes=async()=>{
    let q=sb.from("clientes").select("*");
    if(!esMaster)q=q.eq("user_id",sesion.userId);
    const{data}=await q.order("created_at",{ascending:false});
    if(data)setClientes(data);
  };
  const cargarConfig=async()=>{
    const{data}=await sb.from("config").select("*").eq("id","global");
    if(data&&data.length>0)setConfig({prepagas:data[0].prepagas||DP,estados:data[0].estados||DE,origenes:data[0].origenes||DO,etiquetas:data[0].etiquetas||DET});
    else await sb.from("config").upsert({id:"global",prepagas:DP,estados:DE,origenes:DO,etiquetas:DET});
  };
  const cargarUsuarios=async()=>{const{data}=await sb.from("usuarios").select("*");if(data)setUsuarios(data);};

  useEffect(()=>{
    const init=async()=>{setDbLoading(true);await Promise.all([cargarClientes(),cargarConfig(),cargarUsuarios()]);setDbLoading(false);};
    init();
  },[]);

  const saveConfig=async nc=>{setConfig(nc);await sb.from("config").upsert({id:"global",...nc});};
  const toast2=(msg,tipo="ok")=>{setToast({msg,tipo});setTimeout(()=>setToast(null),3500);};
  const getEst=id=>config.estados.find(e=>e.id===id)||{label:id,color:C.muted};
  const getPlanes=prep=>{const p=config.prepagas.find(x=>x.nombre===prep||x.id===prep);return p?p.planes:[];};

  const myC=esMaster?clientes:clientes.filter(c=>c.user_id===sesion.userId);
  const clientesBase=esMaster&&fUser!=="todos"?clientes.filter(c=>c.user_id===fUser):myC;
  const filtrados=clientesBase.filter(c=>{
    const q=busq.toLowerCase();
    const ok=!q||`${c.nombre} ${c.apellido} ${c.dni} ${c.email} ${c.localidad} ${c.telefono}`.toLowerCase().includes(q);
    return ok&&(!fEst||c.estado===fEst)&&(!fPrep||c.prepaga_contratada===fPrep);
  }).sort((a,b)=>{let va=a[sortBy]||"",vb=b[sortBy]||"";return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);});

  const urgentes6m=myC.filter(c=>{const d=diasRec(c.fecha_alta);return d!==null&&d<=30;});
  const urgentesContacto=myC.filter(c=>{const d=diasContacto(c.proximo_contacto);return d!==null&&d<=3&&d>=0;});
  const totalAlertas=urgentes6m.length+urgentesContacto.length;

  // Validación DNI duplicado
  const verificarDNI=async(dni)=>{
    if(!dni||dni.length<7)return;
    setDniChecking(true);setDniAlerta("");
    const{data}=await sb.from("clientes").select("id,nombre,apellido").eq("dni",dni);
    if(data&&data.length>0){
      const c=data[0];
      const esElMismo=form.id&&data.some(x=>x.id===form.id);
      if(!esElMismo)setDniAlerta(`⚠️ DNI ya registrado: ${c.nombre} ${c.apellido}`);
    }
    setDniChecking(false);
  };

  const hc=(f,v)=>setForm(prev=>{
    const n={...prev,[f]:v};
    if(f==="fecha_nacimiento")n.edad=calcEdad(v);
    if(f==="prepaga_contratada")n.plan_elegido="";
    if(f==="dni"){setDniAlerta("");if(v.length>=7)verificarDNI(v);}
    return n;
  });
  const togArr=(f,v)=>setForm(prev=>{const arr=(prev[f]||[]).includes(v)?(prev[f]||[]).filter(x=>x!==v):[...(prev[f]||[]),v];return{...prev,[f]:arr};});

  const guardar=async()=>{
    if(!form.nombre.trim()||!form.apellido.trim()){toast2("Nombre y apellido requeridos","error");return;}
    if(dniAlerta&&!editando){toast2("Corregí el DNI duplicado antes de guardar","error");return;}
    const entrada=`${new Date().toLocaleDateString("es-AR")} — ${editando?"Datos actualizados":"Cliente creado"}`;
    const data={...form,user_id:sesion.userId,historial:[...(form.historial||[]),entrada]};
    if(!data.id)data.id=genId();
    const{error}=await sb.from("clientes").upsert(data);
    if(error){toast2("Error: "+error.message,"error");return;}
    await cargarClientes();
    toast2(editando?"Cliente actualizado ✓":"Cliente agregado ✓");
    setSec("clientes");setForm({...EC});setEditando(false);setFTab("datos");setDniAlerta("");
  };

  const abrirEditar=c=>{setForm({...c});setEditando(true);setFTab("datos");setSec("form");setMenuOpen(false);setDniAlerta("");};
  const eliminar=async id=>{await sb.from("clientes").delete().eq("id",id);await cargarClientes();setConfirm(null);setDetalle(null);setSec("clientes");toast2("Cliente eliminado");};

  const abrirWA=c=>{
    const tel=(c.whatsapp||c.telefono||"").replace(/\D/g,"");
    if(!tel){toast2("Sin teléfono registrado","error");return;}
    const msg=encodeURIComponent(`Hola ${c.nombre} 👋 Te contacto desde MediPriva. ¿Cómo estás con tu cobertura de salud con ${c.prepaga_contratada||"tu prepaga"}? ¿Querés que revisemos los valores actualizados para tu plan?`);
    window.open(`https://wa.me/54${tel}?text=${msg}`,"_blank");
  };

  };

  // FORM con validación DNI
  const rForm=()=>{
    const planes=getPlanes(form.prepaga_contratada);
    return(

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>

              <div><label style={L}>Sexo</label><select style={I} value={form.sexo} onChange={e=>hc("sexo",e.target.value)}><option value="">Seleccionar</option><option>Masculino</option><option>Femenino</option><option>Otro</option></select></div>
            </div>
            <div style={isMob?{}:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={L}>Teléfono</label><input style={I} value={form.telefono} onChange={e=>hc("telefono",e.target.value)} placeholder="11 6543-2100"/></div>
              <div><label style={L}>WhatsApp</label><input style={I} value={form.whatsapp} onChange={e=>hc("whatsapp",e.target.value)} placeholder="11 6543-2100"/></div>

            <div><label style={L}>Email</label><input style={I} value={form.email} onChange={e=>hc("email",e.target.value)} placeholder="juan@email.com"/></div>
            <div style={isMob?{}:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

              {form.localidad==="Otra"&&<div><label style={L}>¿Cuál?</label><input style={I} value={form.otra_localidad} onChange={e=>hc("otra_localidad",e.target.value)}/></div>}
              <div><label style={L}>Provincia</label><select style={I} value={form.provincia} onChange={e=>hc("provincia",e.target.value)}><option value="">Seleccionar</option>{PRV.map(p=><option key={p}>{p}</option>)}</select></div>
            </div>
            <div><label style={L}>Dirección</label><input style={I} value={form.direccion} onChange={e=>hc("direccion",e.target.value)} placeholder="Calle 1234, Piso 2"/></div>
            <div><label style={L}>Fecha de Alta</label><input type="date" style={I} value={form.fecha_alta} onChange={e=>hc("fecha_alta",e.target.value)}/></div>
            <div>
              <label style={L}>📅 Próximo Contacto</label>
              <input type="date" style={{...I,borderColor:"#0dcaf0"}} value={form.proximo_contacto||""} onChange={e=>hc("proximo_contacto",e.target.value)}/>
              <div style={{fontSize:11,color:"#0dcaf0",marginTop:3}}>Programá cuándo volver a contactar</div>
            </div>
          </div>
        )}
        {fTab==="cobertura"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={isMob?{}:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={L}>Prepaga Contratada</label><select style={I} value={form.prepaga_contratada} onChange={e=>hc("prepaga_contratada",e.target.value)}><option value="">Seleccionar prepaga</option>{config.prepagas.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}</select></div>
              <div><label style={L}>Plan Elegido</label>{planes.length>0?<select style={I} value={form.plan_elegido} onChange={e=>hc("plan_elegido",e.target.value)}><option value="">Seleccionar plan</option>{planes.map(p=><option key={p}>{p}</option>)}</select>:<input style={I} value={form.plan_elegido} onChange={e=>hc("plan_elegido",e.target.value)} placeholder="Escribí el plan..."/>}</div>
            </div>
            <div style={isMob?{}:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={L}>Valor Cotizado ($)</label><input type="number" style={I} value={form.valor_cotizado} onChange={e=>hc("valor_cotizado",e.target.value)} placeholder="0"/></div>
              <div><label style={L}>Prepaga de Origen</label><select style={I} value={form.prepaga_origen} onChange={e=>hc("prepaga_origen",e.target.value)}><option value="">Sin prepaga anterior</option>{config.prepagas.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}<option value="PAMI">PAMI</option><option value="Obra Social">Obra Social</option><option value="Otra">Otra</option></select></div>
            </div>
            <div><label style={L}>Prepagas Cotizadas</label><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>{config.prepagas.map(p=><button key={p.id} onClick={()=>togArr("prepagas_cotizadas",p.nombre)} style={{background:(form.prepagas_cotizadas||[]).includes(p.nombre)?C.green:C.card2,color:(form.prepagas_cotizadas||[]).includes(p.nombre)?"#fff":C.muted,border:`1px solid ${(form.prepagas_cotizadas||[]).includes(p.nombre)?C.green:C.border}`,borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:600,marginBottom:4}}>{(form.prepagas_cotizadas||[]).includes(p.nombre)?"✓ ":""}{p.nombre}</button>)}</div></div>
          </div>
        )}
        {fTab==="seguimiento"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={isMob?{}:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={L}>Estado</label><select style={I} value={form.estado} onChange={e=>hc("estado",e.target.value)}>{config.estados.map(e=><option key={e.id} value={e.id}>{e.label}</option>)}</select></div>
              <div><label style={L}>Origen del Lead</label><select style={I} value={form.origen_lead} onChange={e=>hc("origen_lead",e.target.value)}><option value="">Seleccionar</option>{config.origenes.map(o=><option key={o}>{o}</option>)}</select></div>
            </div>
            <div><label style={L}>Etiquetas</label><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>{config.etiquetas.map(et=><button key={et} onClick={()=>togArr("etiquetas",et)} style={{background:(form.etiquetas||[]).includes(et)?"#6c757d":C.card2,color:(form.etiquetas||[]).includes(et)?"#fff":C.muted,border:`1px solid ${(form.etiquetas||[]).includes(et)?"#6c757d":C.border}`,borderRadius:20,padding:"5px 13px",fontSize:12,cursor:"pointer",fontWeight:600,marginBottom:4}}>{(form.etiquetas||[]).includes(et)?"✓ ":""}{et}</button>)}</div></div>
            <div><label style={L}>Notas</label><textarea style={{...I,height:100,resize:"vertical"}} value={form.notas} onChange={e=>hc("notas",e.target.value)} placeholder="Situación familiar, historial de contacto..."/></div>
          </div>
        )}
        {fTab==="extras"&&(
          <div>
            <div style={{background:C.green+"15",border:`1px solid ${C.green}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:C.green}}>Campos personalizables por cliente</div>
            {(form.campos_extra||[]).map((f,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-end"}}>
                <div style={{flex:1}}><label style={L}>Campo</label><input style={I} value={f.label} onChange={e=>{const a=[...(form.campos_extra||[])];a[i]={...a[i],label:e.target.value};hc("campos_extra",a);}} placeholder="Ej: Hijos"/></div>
                <div style={{flex:2}}><label style={L}>Valor</label><input style={I} value={f.valor} onChange={e=>{const a=[...(form.campos_extra||[])];a[i]={...a[i],valor:e.target.value};hc("campos_extra",a);}} placeholder="Valor..."/></div>
                <button onClick={()=>hc("campos_extra",(form.campos_extra||[]).filter((_,j)=>j!==i))} style={{...B("#dc354530","#dc3545"),padding:"9px 12px"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>hc("campos_extra",[...(form.campos_extra||[]),{label:"",valor:""}])} style={B(C.inputBg,C.green)}>+ Agregar campo</button>
          </div>
        )}
        <div style={{height:20}}/>
        <button onClick={guardar} style={{...B(),width:"100%",padding:14,fontSize:15}}>{editando?"💾 Guardar cambios":"✅ Crear cliente"}</button>
      </div>
    );
  };

  const rSec=()=>{
    switch(sec){
      case"dashboard":return rDash();
      case"clientes":return rClientes();
      case"kanban":return rKanban();
      case"recordatorios":return rRec();
      case"novedades":return rNovedades();
      case"importar":return<ImportadorExcel clientes={myC} config={config} sesion={sesion} showToast={toast2} C={C} I={I} L={L} K={K} B={B} BS={BS} TG={TG} onImportado={cargarClientes}/>;
      case"cartillas":return<CartillasPanel config={config} saveConfig={saveConfig} esMaster={esMaster} showToast={toast2} C={C} I={I} L={L} K={K} B={B} BS={BS}/>;
      case"usuarios":return esMaster?<UsuariosPanel showToast={toast2} onRecargar={cargarUsuarios} C={C} I={I} L={L} K={K} B={B} BS={BS} TG={TG} TB={TB} TBT={TBT} ST={ST}/>:<div/>;
      case"config":return esMaster?<ConfigPanel config={config} saveConfig={saveConfig} showToast={toast2} C={C} I={I} L={L} K={K} B={B} BS={BS} TG={TG} TB={TB} TBT={TBT} ST={ST} temaKey={temaKey} cambiarTema={cambiarTema} TEMAS={TEMAS}/>:<div/>;
      case"detalle":return rDetalle();
      case"form":return rForm();
      default:return rDash();
    }
  };

  const sStyle={width:230,background:C.sidebarBg,borderRight:`1px solid ${C.border}`,height:"100vh",position:"fixed",left:0,top:0,zIndex:200,display:"flex",flexDirection:"column",padding:"0 0 20px",overflowY:"auto"};
  return(
    <div style={{background:C.gradient,minHeight:"100vh",color:C.text}}>
      {!isMob&&<div style={sStyle}><SB/></div>}
      {isMob&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:150,background:C.sidebarBg,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setMenuOpen(true)} style={{background:C.inputBg,color:C.text,border:"none",borderRadius:8,padding:"6px 10px",fontSize:18,cursor:"pointer"}}>☰</button>
        <span style={{fontWeight:800,color:C.green,fontSize:15}}>MediPriva {VERSION}</span>
        {totalAlertas>0&&<span style={{background:"#dc3545",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:12,fontWeight:700}}>{totalAlertas}</span>}
        <button onClick={()=>{setForm({...EC});setEditando(false);setFTab("datos");setSec("form");setDniAlerta("");}} style={{background:C.green,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer",marginLeft:"auto"}}>+</button>
      </div>}
      {isMob&&menuOpen&&<div style={{position:"fixed",left:0,top:0,zIndex:300,width:"100vw",height:"100vh",background:"#0008",backdropFilter:"blur(4px)"}} onClick={()=>setMenuOpen(false)}>
        <div style={{...sStyle,width:260,position:"relative",height:"100vh"}} onClick={e=>e.stopPropagation()}><SB/></div>
      </div>}
      <div style={isMob?{marginLeft:0,padding:"70px 12px 20px"}:{marginLeft:230,minHeight:"100vh",padding:"24px 20px"}}>{rSec()}</div>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.tipo==="error"?"#dc3545":C.green,color:"#fff",borderRadius:10,padding:"11px 24px",fontWeight:700,fontSize:14,zIndex:9999,boxShadow:"0 6px 30px #0006",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );
}

// NOVEDADES WHATSAPP
function NovedadesPanel({clientes,config,C,I,L,K,B,BS,TG,TB,TBT,toast2}){
  const[tab,setTab]=useState("enviar");
  const[msg,setMsg]=useState(`¡Hola! 👋 Te escribimos desde *MediPriva*.\n\nTenemos novedades sobre coberturas de salud que te pueden interesar.\n\n📰 Mirá nuestro blog con las últimas noticias:\n👉 https://medipriva.com.ar/blog/\n\n¡Cualquier consulta estamos a tu disposición!`);
  const[fPrep,setFPrep]=useState("");
  const[fEst,setFEst]=useState("");
  const[seleccionados,setSeleccionados]=useState([]);
  const[enviados,setEnviados]=useState(0);

  const clientesFiltrados=clientes.filter(c=>{
    const okP=!fPrep||c.prepaga_contratada===fPrep;
    const okE=!fEst||c.estado===fEst;
    return okP&&okE&&(c.whatsapp||c.telefono);
  });

  const toggleSel=id=>setSeleccionados(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const selTodos=()=>setSeleccionados(clientesFiltrados.map(c=>c.id));
  const deselTodos=()=>setSeleccionados([]);

  const enviarWA=c=>{
    const tel=(c.whatsapp||c.telefono||"").replace(/\D/g,"");
    if(!tel)return;
    const msgFinal=msg.replace("{nombre}",c.nombre).replace("{prepaga}",c.prepaga_contratada||"tu prepaga");
    window.open(`https://wa.me/54${tel}?text=${encodeURIComponent(msgFinal)}`,"_blank");
    setEnviados(e=>e+1);
  };

  const clientesParaEnviar=clientesFiltrados.filter(c=>seleccionados.includes(c.id));

  return(
    <div>
      <h2 style={{margin:"0 0 6px",fontSize:20,fontWeight:800,color:C.text}}>📢 Novedades por WhatsApp</h2>
      <div style={{color:C.muted,fontSize:13,marginBottom:14}}>Enviá mensajes y novedades a tus clientes uno por uno</div>
      <div style={TB}>
        {[["enviar","✉️ Armar envío"],["historial","📊 Estadísticas"]].map(([id,label])=>(
          <button key={id} style={TBT(tab===id)} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==="enviar"&&(
        <div>
          <div style={K}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Mensaje</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Usá <strong style={{color:C.green}}>{"{nombre}"}</strong> y <strong style={{color:C.green}}>{"{prepaga}"}</strong> como variables</div>
            <textarea style={{...I,height:140,resize:"vertical",fontSize:13}} value={msg} onChange={e=>setMsg(e.target.value)}/>
            <div style={{background:C.green+"15",border:`1px solid ${C.green}`,borderRadius:8,padding:"10px 12px",marginTop:10}}>
              <div style={{fontSize:11,color:C.green,fontWeight:700,marginBottom:4}}>VISTA PREVIA</div>
              <div style={{fontSize:12,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.6}}>{msg.replace("{nombre}","Juan").replace("{prepaga}","Medife")}</div>
            </div>
          </div>

          <div style={K}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Filtrar destinatarios</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <select style={{...I,width:"auto",flex:1}} value={fPrep} onChange={e=>setFPrep(e.target.value)}>
                <option value="">Todas las prepagas</option>
                {config.prepagas.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}
              </select>
              <select style={{...I,width:"auto",flex:1}} value={fEst} onChange={e=>setFEst(e.target.value)}>
                <option value="">Todos los estados</option>
                {config.estados.map(e=><option key={e.id} value={e.id}>{e.label}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:C.muted}}>{clientesFiltrados.length} clientes con teléfono · {seleccionados.length} seleccionados</span>
              <button onClick={selTodos} style={BS()}>✓ Todos</button>
              <button onClick={deselTodos} style={BS(C.inputBg,C.muted)}>✗ Ninguno</button>
            </div>
          </div>

          <div style={{...K,maxHeight:320,overflowY:"auto"}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Seleccionar clientes ({clientesFiltrados.length})</div>
            {clientesFiltrados.length===0?<div style={{color:C.muted,fontSize:13}}>Sin clientes con teléfono para el filtro seleccionado.</div>
            :clientesFiltrados.map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <input type="checkbox" checked={seleccionados.includes(c.id)} onChange={()=>toggleSel(c.id)} style={{width:16,height:16,accentColor:C.green,cursor:"pointer",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:C.text}}>{c.nombre} {c.apellido}</div>
                  <div style={{fontSize:11,color:C.muted}}>{c.prepaga_contratada||"-"} · {c.whatsapp||c.telefono}</div>
                </div>
                {seleccionados.includes(c.id)&&<button onClick={()=>enviarWA(c)} style={BS("#25D366")}>💬 Enviar</button>}
              </div>
            ))}

function ImportadorExcel({clientes,config,sesion,showToast,C,I,L,K,B,BS,TG,onImportado}){
  const[archivo,setArchivo]=useState(null);
  const[preview,setPreview]=useState([]);
  const[loading,setLoading]=useState(false);
  const[resultado,setResultado]=useState(null);
  const[paso,setPaso]=useState(1); // 1=subir, 2=preview, 3=resultado

  const SURL="https://rpivnkrypoisidqunxkr.supabase.co";
  const SKEY="sb_publishable_a6C7dxN10vteft6-lexh1g_5c9wxIzI";

  const genId=()=>`id_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;

  const splitNombre=(nombre)=>{
    if(!nombre)return["",""];
    const p=nombre.trim().split(/\s+/);
    if(p.length>=4)return[p.slice(0,2).map(x=>x.charAt(0).toUpperCase()+x.slice(1).toLowerCase()).join(" "),p.slice(2).map(x=>x.charAt(0).toUpperCase()+x.slice(1).toLowerCase()).join(" ")];
    if(p.length===3)return[p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase(),p.slice(1).map(x=>x.charAt(0).toUpperCase()+x.slice(1).toLowerCase()).join(" ")];
    if(p.length===2)return[p[0].charAt(0).toUpperCase()+p[0].slice(1).toLowerCase(),p[1].charAt(0).toUpperCase()+p[1].slice(1).toLowerCase()];
    return[nombre,""];
  };

  const detectarPrepaga=(row)=>{
    const vals=Object.values(row).map(v=>String(v||"").toUpperCase());
    const str=vals.join(" ");
    if(str.includes("AVALIAN"))return"Avalian";
    if(str.includes("PREMEDIC"))return"Premedic";
    if(str.includes("SANCOR")||str.includes("SAN COR"))return"SanCor Salud";
    if(str.includes("MEDIFE"))return"Medife";
    if(str.includes("OMINT"))return"Omint";
    if(str.includes("GALENO"))return"Galeno";
    if(str.includes("SWISS"))return"Swiss Medical";
    if(str.includes("DOCTORED")||str.includes("DOCTO RED"))return"DoctoRed";
    if(str.includes("PREVENCION")||str.includes("PREVENCIÓN"))return"Prevención Salud";
    return"";
  };

  const parsearFecha=(val)=>{
    if(!val||val==="NaT"||val==="nan")return"";
    const s=String(val).trim();
    // formato YYYY-MM-DD
    if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
    // formato DD/MM/YYYY
    if(/^\d{2}\/\d{2}\/\d{4}/.test(s)){const[d,m,y]=s.split("/");return`${y}-${m}-${d}`;}
    // formato DD-MM-YYYY  
    if(/^\d{2}-\d{2}-\d{4}/.test(s)){const[d,m,y]=s.split("-");return`${y}-${m}-${d}`;}
    return"";
  };

  const procesarExcel=(file)=>{
    setArchivo(file);setLoading(true);setResultado(null);
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"binary",cellDates:true});
        const clientes=[];
        
        wb.SheetNames.forEach(sheetName=>{
          const ws=wb.Sheets[sheetName];
          const rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
          if(rows.length===0)return;
          
          rows.forEach(row=>{
            // Buscar columnas de DNI
            const dniKey=Object.keys(row).find(k=>k.toLowerCase().includes("dni"));
            const dniVal=dniKey?String(row[dniKey]||"").replace(/\.0$/,"").trim():"";
            if(!dniVal||dniVal==="nan"||dniVal.length<6)return;
            
            // Buscar nombre
            const nomKey=Object.keys(row).find(k=>k.toLowerCase().includes("nombre")||k.toLowerCase().includes("name"));
            const nomVal=nomKey?String(row[nomKey]||""):"";
            const[apellido,nombre]=splitNombre(nomVal);
            
            // Buscar plan
            const planKey=Object.keys(row).find(k=>k.toLowerCase().includes("plan"));
            const planVal=planKey?String(row[planKey]||"").replace(/\.0$/,"").trim():"";
            
            // Buscar fecha alta
            const altaKey=Object.keys(row).find(k=>k.toLowerCase().includes("alta")||k.toLowerCase().includes("ingreso"));
            const altaVal=altaKey?parsearFecha(row[altaKey]):"";
            
            // Buscar fecha nacimiento
            const nacKey=Object.keys(row).find(k=>k.toLowerCase().includes("nac")||k.toLowerCase().includes("nacimiento")||k.toLowerCase().includes("birth"));
            const nacVal=nacKey?parsearFecha(row[nacKey]):"";
            
            // Buscar valor
            const valKey=Object.keys(row).find(k=>k.toLowerCase().includes("valor")||k.toLowerCase().includes("cuota")||k.toLowerCase().includes("monto"));
            let valVal="";
            if(valKey){const v=parseFloat(String(row[valKey]||"").replace(/[^0-9.]/g,""));if(!isNaN(v)&&v>0)valVal=String(Math.round(v));}
            
            // Detectar prepaga
            const prepaga=detectarPrepaga(row);
            
            clientes.push({
              id:genId(),
              user_id:sesion.userId,
              nombre,apellido,dni:dniVal,
              fecha_nacimiento:nacVal,
              fecha_alta:altaVal,
              prepaga_contratada:prepaga,
              plan_elegido:planVal==="nan"?"":planVal,
              valor_cotizado:valVal,
              estado:"vendido",
              provincia:"Buenos Aires",
              etiquetas:[],
              prepagas_cotizadas:[],
              campos_extra:[],
              historial:["Importado desde Excel"],
              sexo:"",edad:"",telefono:"",whatsapp:"",email:"",
              localidad:"",otra_localidad:"",direccion:"",
              origen_lead:"",valor_cotizado_prep:"",prepaga_origen:"",
              notas:"Importado desde Excel",proximo_contacto:"",
            });
          });
        });
        
        setPreview(clientes);setPaso(2);setLoading(false);
      }catch(err){
        showToast("Error leyendo Excel: "+err.message,"error");setLoading(false);
      }
    };
    reader.readAsBinaryString(file);
  };

  const importar=async()=>{
    if(preview.length===0){showToast("Sin datos para importar","error");return;}
    setLoading(true);setResultado(null);
    let ok=0,errors=0;
    
    // Insertar de a 5
    for(let i=0;i<preview.length;i+=5){
      const batch=preview.slice(i,i+5);
      try{
        const resp=await fetch(`${SURL}/rest/v1/clientes`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Prefer":"resolution=ignore-duplicates"},
          body:JSON.stringify(batch)
        });
        if(resp.ok||resp.status===201){ok+=batch.length;}
        else{const e=await resp.text();console.error("Error batch:",e);errors+=batch.length;}
      }catch(e){errors+=batch.length;}
    }
    
    setResultado({ok,errors,total:preview.length});
    setPaso(3);setLoading(false);
    if(ok>0){await onImportado();showToast(`${ok} clientes importados ✓`);}
  };

  return(
    <div>
      <h2 style={{margin:"0 0 6px",fontSize:20,fontWeight:800,color:C.text}}>📥 Importar Excel</h2>
      <div style={{color:C.muted,fontSize:13,marginBottom:16}}>Importá clientes desde un archivo Excel directamente al CRM</div>
      
      {/* Paso 1: Subir archivo */}
      {paso===1&&(
        <div>
          <div style={{...K,borderTop:`3px solid ${C.green}`}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>¿Qué detecta automáticamente?</div>
            <div style={{fontSize:12,color:C.muted,lineHeight:2}}>
              ✅ DNI · Nombre y Apellido · Prepaga (Avalian, SanCor, Premedic, etc.)<br/>
              ✅ Plan · Fecha de Alta · Fecha de Nacimiento · Valor del plan<br/>
              ✅ Funciona con múltiples hojas en el mismo archivo<br/>
              ⚠️ Formatos soportados: .xlsx y .xls
            </div>
          </div>
          <div style={{...K,textAlign:"center",padding:"30px 16px"}}>
            <div style={{fontSize:40,marginBottom:12}}>📊</div>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>Seleccioná tu archivo Excel</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>El archivo no se sube a ningún servidor externo, se procesa directo en tu dispositivo</div>
            <label style={{...B(),cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,padding:"12px 24px",fontSize:15}}>
              {loading?"⏳ Procesando...":"📂 Elegir archivo Excel"}
              <input type="file" accept=".xlsx,.xls" onChange={e=>e.target.files[0]&&procesarExcel(e.target.files[0])} style={{display:"none"}} disabled={loading}/>
            </label>
          </div>
        </div>
      )}

      {/* Paso 2: Preview */}
      {paso===2&&preview.length>0&&(
        <div>
          <div style={{...K,borderTop:`3px solid ${C.green}`,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:C.text}}>✅ {preview.length} clientes detectados</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>Revisá antes de importar</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setPaso(1);setPreview([]);setArchivo(null);}} style={BS(C.card2||"#1a1d28",C.muted)}>← Volver</button>
                <button onClick={importar} disabled={loading} style={{...B(),opacity:loading?0.7:1}}>{loading?"⏳ Importando...":"✅ Importar al CRM"}</button>
              </div>
            </div>
          </div>
          
          <div style={{...K,maxHeight:400,overflowY:"auto"}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Vista previa ({preview.length} clientes)</div>
            {preview.map((c,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",gap:4}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:C.text}}>{c.apellido}, {c.nombre}</div>
                  <div style={{fontSize:11,color:C.muted}}>DNI: {c.dni} · {c.fecha_nacimiento||"Sin fecha nac."}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:12,color:C.green,fontWeight:600}}>{c.prepaga_contratada||"Sin prepaga"}</div>
                  <div style={{fontSize:11,color:C.muted}}>{c.plan_elegido||""} {c.valor_cotizado?`· $${c.valor_cotizado}`:""}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Paso 3: Resultado */}
      {paso===3&&resultado&&(
        <div>
          <div style={{...K,borderTop:`3px solid ${resultado.errors===0?C.green:"#ffc107"}`,textAlign:"center",padding:"24px 16px"}}>
            <div style={{fontSize:40,marginBottom:12}}>{resultado.errors===0?"🎉":"⚠️"}</div>
            <div style={{fontSize:18,fontWeight:800,color:resultado.errors===0?C.green:"#ffc107",marginBottom:8}}>
              {resultado.ok} de {resultado.total} clientes importados
            </div>
            {resultado.errors>0&&<div style={{fontSize:13,color:"#ffc107",marginBottom:8}}>{resultado.errors} clientes con error (posibles duplicados de DNI)</div>}
            <div style={{fontSize:12,color:C.muted,marginBottom:16}}>Los clientes ya aparecen en tu CRM con estado Vendido</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>{setPaso(1);setPreview([]);setArchivo(null);setResultado(null);}} style={B()}>+ Importar otro archivo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function CartillasPanel({config,saveConfig,esMaster,showToast,C,I,L,K,B,BS}){
  const[prepSelec,setPrepSelec]=useState(config.prepagas[0]?.id||"");
  const[uploading,setUploading]=useState(false);
  const prep=config.prepagas.find(p=>p.id===prepSelec);
  const subirPDF=async e=>{
    const file=e.target.files[0];
    if(!file||file.type!=="application/pdf"){showToast("Solo archivos PDF","error");return;}
    if(file.size>4*1024*1024){showToast("PDF máximo 4MB","error");return;}
    setUploading(true);
    const reader=new FileReader();
    reader.onload=async ev=>{
      const np=[...(prep.pdfs||[]),{id:genId(),nombre:file.name,data:ev.target.result,fecha:new Date().toLocaleDateString("es-AR")}];
      await saveConfig({...config,prepagas:config.prepagas.map(p=>p.id===prepSelec?{...p,pdfs:np}:p)});
      setUploading(false);showToast("PDF cargado ✓");
    };
    reader.readAsDataURL(file);e.target.value="";
  };
  const eliminarPDF=async id=>{await saveConfig({...config,prepagas:config.prepagas.map(p=>p.id===prepSelec?{...p,pdfs:(p.pdfs||[]).filter(x=>x.id!==id)}:p)});showToast("PDF eliminado");};
  const abrirPDF=pdf=>{const w=window.open();w.document.write(`<iframe src="${pdf.data}" style="width:100%;height:100vh;border:none"></iframe>`);};
  const descargarPDF=pdf=>{const a=document.createElement("a");a.href=pdf.data;a.download=pdf.nombre;a.click();};
  return(
    <div>
      <h2 style={{margin:"0 0 8px",fontSize:20,fontWeight:800,color:C.text}}>📄 Cartillas y PDFs</h2>
      <div style={{color:C.muted,fontSize:13,marginBottom:14}}>Documentación por prepaga</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {config.prepagas.map(p=>(
          <button key={p.id} onClick={()=>setPrepSelec(p.id)} style={{background:prepSelec===p.id?C.green:C.card2,color:prepSelec===p.id?"#fff":C.muted,border:`1px solid ${prepSelec===p.id?C.green:C.border}`,borderRadius:8,padding:"7px 14px",fontWeight:600,cursor:"pointer",fontSize:13}}>
            {p.nombre}{(p.pdfs||[]).length>0&&<span style={{marginLeft:5,background:"#fff3",borderRadius:8,padding:"0 5px",fontSize:11}}>{p.pdfs.length}</span>}
          </button>
        ))}
      </div>
      {prep&&<div style={{...K,borderTop:`3px solid ${C.green}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div><div style={{fontWeight:700,fontSize:15,color:C.text}}>{prep.nombre}</div><div style={{fontSize:12,color:C.muted}}>{(prep.pdfs||[]).length} archivos</div></div>
          {esMaster&&<label style={{...B(),cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}>{uploading?"⏳ Subiendo...":"📤 Subir PDF"}<input type="file" accept="application/pdf" onChange={subirPDF} style={{display:"none"}} disabled={uploading}/></label>}
        </div>
        {(prep.pdfs||[]).length===0?<div style={{textAlign:"center",padding:"28px 0",color:C.muted}}><div style={{fontSize:34}}>📭</div><div style={{marginTop:6}}>Sin PDFs para {prep.nombre}</div></div>
        :(prep.pdfs||[]).map(pdf=>(
          <div key={pdf.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:34,height:34,background:"#dc354520",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📄</div>
              <div><div style={{fontWeight:600,fontSize:13,color:C.text}}>{pdf.nombre}</div><div style={{fontSize:11,color:C.muted}}>{pdf.fecha}</div></div>
            </div>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>abrirPDF(pdf)} style={BS()}>👁️</button>
              <button onClick={()=>descargarPDF(pdf)} style={BS("#1a6b3c")}>⬇️</button>
              {esMaster&&<button onClick={()=>eliminarPDF(pdf.id)} style={BS("#dc354530","#dc3545")}>🗑️</button>}
            </div>
          </div>
        ))}
      </div>}
    </div>
  );
}

        <button onClick={()=>setTab("nuevo")} style={{...B(),marginTop:8}}>+ Crear usuario</button>
      </div>}
      {tab==="nuevo"&&<div style={{maxWidth:460}}><div style={K}><div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={L}>Nombre completo</label><input style={I} value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))} placeholder="Ej: Carlos Rodríguez"/></div>
        <div><label style={L}>Usuario</label><input style={I} value={form.usuario} onChange={e=>setForm(p=>({...p,usuario:e.target.value.replace(/\s/g,"")}))} placeholder="Ej: carlos"/></div>
        <div>
          <label style={L}>Contraseña</label>
          <div style={{display:"flex",gap:8}}>
            <input style={{...I,flex:1,fontFamily:"monospace"}} value={form.clave} onChange={e=>setForm(p=>({...p,clave:e.target.value}))} placeholder="Escribí o generá..."/>
            <button onClick={gc} style={B("#fd7e14")}>🎲 Generar</button>
          </div>
          {claveGen&&<div style={{marginTop:8,padding:"10px",background:C.green+"15",border:`1px solid ${C.green}`,borderRadius:8}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:700}}>CLAVE GENERADA</div>
            <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:C.green}}>{claveGen}</div>
            <button onClick={()=>{navigator.clipboard.writeText(claveGen);showToast("Copiada ✓");}} style={{...BS(),marginTop:6}}>📋 Copiar</button>
          </div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><input type="checkbox" checked={form.activo} onChange={e=>setForm(p=>({...p,activo:e.target.checked}))} style={{width:15,height:15,accentColor:C.green}}/><span style={{fontSize:13,color:C.text}}>Usuario activo</span></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={guardar} style={{...B(),flex:1}}>{editId?"💾 Actualizar":"✅ Crear usuario"}</button>
          {editId&&<button onClick={()=>{setEditId(null);setForm({nombre:"",usuario:"",clave:"",activo:true});setClaveGen("");setTab("lista");}} style={B(C.inputBg,C.muted)}>Cancelar</button>}
        </div>
      </div></div></div>}
      {tab==="master"&&<div style={{maxWidth:380}}><div style={K}>
        <div style={{...ST}}>Contraseña Admin</div>
        <div style={{fontFamily:"monospace",fontSize:16,fontWeight:700,color:C.green,padding:"9px 12px",background:C.green+"15",borderRadius:7,marginBottom:12}}>{masterPass}</div>
        <label style={L}>Nueva contraseña</label>
        <input type="password" style={{...I,marginBottom:10}} value={newMP} onChange={e=>setNewMP(e.target.value)} placeholder="Mínimo 6 caracteres..."/>
        <button onClick={cambiarMP} style={{...B(),width:"100%"}}>🔐 Cambiar</button>
      </div></div>}
    </div>
  );
}

function ConfigPanel({config,saveConfig,showToast,C,I,L,K,B,BS,TG,TB,TBT,ST,temaKey,cambiarTema,TEMAS}){
  const[tab,setTab]=useState("temas");
  const[newPrep,setNewPrep]=useState("");
  const[newPlan,setNewPlan]=useState({});
  const[newEst,setNewEst]=useState({label:"",color:"#10b981"});
  const[newOri,setNewOri]=useState("");
  const[newEtiq,setNewEtiq]=useState("");
  const[editPlan,setEditPlan]=useState(null);
  const upd=async(key,val)=>await saveConfig({...config,[key]:val});
  return(
    <div>
      <h2 style={{margin:"0 0 14px",fontSize:20,fontWeight:800,color:C.text}}>⚙️ Configuración</h2>
      <div style={TB}>
        {[["temas","🎨 Temas"],["prepagas","🏥 Prepagas"],["estados","🏷️ Estados"],["origenes","📍 Orígenes"],["etiquetas","🔖 Etiquetas"]].map(([id,label])=>(
          <button key={id} style={TBT(tab===id)} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==="temas"&&(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Elegí el tema visual del CRM. Se aplica solo en este dispositivo.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
            {Object.entries(TEMAS).map(([key,tema])=>(
              <div key={key} onClick={()=>{cambiarTema(key);showToast(`Tema ${tema.nombre} aplicado ✓`);}} style={{
                background:tema.gradient,border:`2px solid ${temaKey===key?tema.green:"transparent"}`,
                borderRadius:12,padding:"14px 12px",cursor:"pointer",textAlign:"center",
                boxShadow:temaKey===key?`0 0 0 2px ${tema.green}40`:"none",transition:"all 0.2s"
              }}>
                <div style={{fontSize:24,marginBottom:6}}>{tema.nombre.split(" ")[0]}</div>
                <div style={{fontSize:12,fontWeight:700,color:tema.text}}>{tema.nombre.split(" ").slice(1).join(" ")}</div>
                <div style={{width:30,height:4,background:tema.green,borderRadius:2,margin:"8px auto 0"}}/>
                {temaKey===key&&<div style={{fontSize:10,color:tema.green,marginTop:4,fontWeight:700}}>✓ ACTIVO</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="prepagas"&&<div>
        <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Doble click en un plan para editarlo.</div>
        {config.prepagas.map((p,pi)=>(
          <div key={p.id} style={{...K,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <span style={{fontWeight:700,color:C.text}}>{p.nombre}</span>
              <button onClick={()=>upd("prepagas",config.prepagas.filter((_,i)=>i!==pi))} style={BS("#dc354530","#dc3545")}>✕</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:7}}>
              {p.planes.map((plan,pli)=>(
                <div key={pli} style={{display:"flex",alignItems:"center",gap:3,background:C.card2,borderRadius:5,padding:"3px 7px"}}>
                  {editPlan===`${pi}-${pli}`?<input style={{...I,padding:"2px 5px",width:110,fontSize:12}} defaultValue={plan} autoFocus onBlur={async e=>{const a=[...config.prepagas];a[pi]={...a[pi],planes:a[pi].planes.map((x,j)=>j===pli?e.target.value:x)};await upd("prepagas",a);setEditPlan(null);}}/>
                  :<span style={{fontSize:12,color:C.text}} onDoubleClick={()=>setEditPlan(`${pi}-${pli}`)}>{plan}</span>}
                  <button onClick={async()=>{const a=[...config.prepagas];a[pi]={...a[pi],planes:a[pi].planes.filter((_,j)=>j!==pli)};await upd("prepagas",a);}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11}}>✕</button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:5}}>
              <input style={{...I,flex:1}} placeholder="Nuevo plan..." value={newPlan[pi]||""} onChange={e=>setNewPlan(p=>({...p,[pi]:e.target.value}))}/>
              <button onClick={async()=>{if(!newPlan[pi]?.trim())return;const a=[...config.prepagas];a[pi]={...a[pi],planes:[...a[pi].planes,newPlan[pi].trim()]};await upd("prepagas",a);setNewPlan(p=>({...p,[pi]:""}));showToast("Plan agregado ✓");}} style={BS()}>+ Plan</button>
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <input style={{...I,flex:1}} placeholder="Nueva prepaga..." value={newPrep} onChange={e=>setNewPrep(e.target.value)}/>
          <button onClick={async()=>{if(!newPrep.trim())return;await upd("prepagas",[...config.prepagas,{id:genId(),nombre:newPrep.trim(),planes:[],pdfs:[]}]);setNewPrep("");showToast("Prepaga agregada ✓");}} style={B()}>+ Prepaga</button>
        </div>
      </div>}

      {tab==="estados"&&<div>
        {config.estados.map((e,i)=>(
          <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:e.color,flexShrink:0}}/>
            <span style={{flex:1,fontWeight:600,color:C.text}}>{e.label}</span>
            <input type="color" value={e.color} onChange={async ev=>{const a=[...config.estados];a[i]={...a[i],color:ev.target.value};await upd("estados",a);}} style={{width:30,height:26,border:"none",background:"none",cursor:"pointer"}}/>
            <button onClick={()=>upd("estados",config.estados.filter((_,j)=>j!==i))} style={BS("#dc354530","#dc3545")}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input style={{...I,flex:1}} placeholder="Nuevo estado..." value={newEst.label} onChange={e=>setNewEst(p=>({...p,label:e.target.value}))}/>
          <input type="color" value={newEst.color} onChange={e=>setNewEst(p=>({...p,color:e.target.value}))} style={{width:38,height:34,border:"none",background:"none",cursor:"pointer"}}/>
          <button onClick={async()=>{if(!newEst.label.trim())return;await upd("estados",[...config.estados,{id:genId(),...newEst}]);setNewEst({label:"",color:"#10b981"});showToast("Estado agregado ✓");}} style={B()}>+ Estado</button>
        </div>
      </div>}

      {tab==="origenes"&&<div>
        {config.origenes.map((o,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,color:C.text}}>📍 {o}</span>
            <button onClick={()=>upd("origenes",config.origenes.filter((_,j)=>j!==i))} style={BS("#dc354530","#dc3545")}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input style={{...I,flex:1}} placeholder="Nuevo origen..." value={newOri} onChange={e=>setNewOri(e.target.value)}/>
          <button onClick={async()=>{if(!newOri.trim())return;await upd("origenes",[...config.origenes,newOri.trim()]);setNewOri("");showToast("Origen agregado ✓");}} style={B()}>+ Agregar</button>
        </div>
      </div>}

      {tab==="etiquetas"&&<div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
          {config.etiquetas.map((et,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"#6c757d22",border:"1px solid #6c757d",borderRadius:18,padding:"3px 10px"}}>
              <span style={{fontSize:12,color:C.text}}>{et}</span>
              <button onClick={()=>upd("etiquetas",config.etiquetas.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input style={{...I,flex:1}} placeholder="Nueva etiqueta..." value={newEtiq} onChange={e=>setNewEtiq(e.target.value)}/>
          <button onClick={async()=>{if(!newEtiq.trim())return;await upd("etiquetas",[...config.etiquetas,newEtiq.trim()]);setNewEtiq("");showToast("Etiqueta agregada ✓");}} style={B()}>+ Agregar</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
